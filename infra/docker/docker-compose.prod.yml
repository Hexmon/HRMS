x-backend-build: &backend-build
  context: ../..
  dockerfile: infra/docker/Dockerfile

x-backend-environment: &backend-environment
  NODE_ENV: production
  PORT: "3001"
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: ${DATABASE_URL}
  VALKEY_URL: ${VALKEY_URL}
  OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-cloudinary}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
  CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-hawkaii-hrms}
  CLOUDINARY_RESOURCE_TYPE: ${CLOUDINARY_RESOURCE_TYPE:-auto}
  CLOUDINARY_UPLOAD_TRANSFORMATION: ${CLOUDINARY_UPLOAD_TRANSFORMATION:-q_auto:eco,f_auto}
  CLOUDINARY_MOCK_UPLOADS: "false"
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
  MINIO_BUCKET: ${MINIO_BUCKET:-hawkaii-hrms}
  MINIO_REGION: ${MINIO_REGION:-us-east-1}
  PDF_COMPRESSION_ENABLED: ${PDF_COMPRESSION_ENABLED:-true}
  PDF_COMPRESSION_BINARY: ${PDF_COMPRESSION_BINARY:-gs}
  PDF_COMPRESSION_QUALITY: ${PDF_COMPRESSION_QUALITY:-ebook}
  PDF_COMPRESSION_MIN_BYTES: ${PDF_COMPRESSION_MIN_BYTES:-131072}
  PDF_COMPRESSION_TIMEOUT_MS: ${PDF_COMPRESSION_TIMEOUT_MS:-30000}
  PDF_COMPRESSION_FAIL_OPEN: ${PDF_COMPRESSION_FAIL_OPEN:-true}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hrms_session}
  COOKIE_SECURE: ${COOKIE_SECURE:-true}
  API_BASE_URL: ${API_BASE_URL:-http://hawkaii-hrms-api:3001}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  HRMS_DATA_STORE: postgres
  OUTBOX_WORKER_INTERVAL_MS: ${OUTBOX_WORKER_INTERVAL_MS:-2000}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrms_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-hrms_platform}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:9.0.3-alpine
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - valkey-data:/data

  hawkaii-hrms-migrate:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ["pnpm", "db:migrate:prod"]
    restart: "no"

  hawkaii-hrms-api:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    command: ["pnpm", "start"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  hawkaii-hrms-outbox-worker:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-api:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ["pnpm", "worker:start"]
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
