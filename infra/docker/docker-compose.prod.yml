x-backend-build: &backend-build
  context: ../..
  dockerfile: infra/docker/Dockerfile

x-backend-environment: &backend-environment
  NODE_ENV: production
  PORT: "3001"
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: ${DATABASE_URL}
  VALKEY_URL: ${VALKEY_URL}
  OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-hrms-documents}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hrms_session}
  COOKIE_SECURE: ${COOKIE_SECURE:-true}
  API_BASE_URL: ${API_BASE_URL:-http://hawkaii-hrms-api:3001}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  HRMS_DATA_STORE: postgres
  OUTBOX_WORKER_INTERVAL_MS: ${OUTBOX_WORKER_INTERVAL_MS:-2000}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrms_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-hrms_platform}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:9.0.3-alpine
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - valkey-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  hawkaii-hrms-migrate:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["pnpm", "db:migrate:prod"]
    restart: "no"

  hawkaii-hrms-api:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    command: ["pnpm", "start"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  hawkaii-hrms-outbox-worker:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-api:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ["pnpm", "worker:start"]
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
  minio-data:
