x-backend-build: &backend-build
  context: ../..
  dockerfile: infra/docker/Dockerfile

x-backend-environment: &backend-environment
  NODE_ENV: development
  PORT: "3001"
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/hrms_platform
  TEST_DATABASE_URL: postgres://postgres:postgres@postgres:5432/hrms_platform_test
  VALKEY_URL: redis://valkey:6379
  OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-local-cloudinary-mock}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-local-cloudinary-key}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-local-cloudinary-secret}
  CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-hawkaii-hrms-dev}
  CLOUDINARY_RESOURCE_TYPE: ${CLOUDINARY_RESOURCE_TYPE:-auto}
  CLOUDINARY_UPLOAD_TRANSFORMATION: ${CLOUDINARY_UPLOAD_TRANSFORMATION:-q_auto:eco,f_auto}
  CLOUDINARY_MOCK_UPLOADS: ${CLOUDINARY_MOCK_UPLOADS:-true}
  MINIO_ENDPOINT: ${MINIO_DOCKER_ENDPOINT:-http://minio:9000}
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:19000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-hawkaii-hrms-dev}
  MINIO_REGION: ${MINIO_REGION:-us-east-1}
  PDF_COMPRESSION_ENABLED: ${PDF_COMPRESSION_ENABLED:-true}
  PDF_COMPRESSION_BINARY: ${PDF_COMPRESSION_BINARY:-gs}
  PDF_COMPRESSION_QUALITY: ${PDF_COMPRESSION_QUALITY:-ebook}
  PDF_COMPRESSION_MIN_BYTES: ${PDF_COMPRESSION_MIN_BYTES:-131072}
  PDF_COMPRESSION_TIMEOUT_MS: ${PDF_COMPRESSION_TIMEOUT_MS:-30000}
  PDF_COMPRESSION_FAIL_OPEN: ${PDF_COMPRESSION_FAIL_OPEN:-true}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-change-me}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-change-me}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hrms_session}
  COOKIE_SECURE: "false"
  API_BASE_URL: http://hawkaii-hrms-api:3001
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
  HRMS_DATA_STORE: postgres
  OUTBOX_WORKER_INTERVAL_MS: ${OUTBOX_WORKER_INTERVAL_MS:-2000}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrms_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-hrms_platform_test}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-hrms_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  valkey:
    image: valkey/valkey:9.0.3-alpine
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - valkey-data:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  hawkaii-hrms-migrate:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["sh", "-lc", "pnpm db:migrate && pnpm release:seed"]
    restart: "no"

  hawkaii-hrms-api:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    command: ["pnpm", "start"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  hawkaii-hrms-outbox-worker:
    build: *backend-build
    environment: *backend-environment
    depends_on:
      hawkaii-hrms-api:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ["pnpm", "worker:start"]
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
  minio-data:
