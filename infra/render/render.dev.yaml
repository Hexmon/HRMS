# Render blueprint for the hosted Hawkaii HRMS dev environment.
#
# Local development should still use local Docker/env files. This hosted dev
# stack is for shared integration checks at https://dev.hawkaii.in.

services:
  - type: keyvalue
    name: hawkaii-hrms-dev-valkey
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    runtime: docker
    name: hawkaii-hrms-dev-api
    dockerfilePath: ./hrms_backend/infra/docker/Dockerfile
    dockerContext: ./hrms_backend
    plan: starter
    healthCheckPath: /api/v1/health/live
    preDeployCommand: pnpm db:migrate:prod
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: APP_ENV
        value: "development"
      - key: APP_VERSION
        value: "0.1.0"
      - key: BUILD_SHA
        sync: false
      - key: PORT
        value: "3001"
      - key: LOG_LEVEL
        value: "debug"
      - key: HRMS_DATA_STORE
        value: "postgres"
      - key: TRUST_PROXY
        value: "true"
      - key: OPENAPI_PUBLIC
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_NAME
        value: "hrms_dev_session"
      - key: DATABASE_URL
        sync: false
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: hawkaii-hrms-dev-valkey
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: APP_URL
        value: "https://dev-api.hawkaii.in"
      - key: API_BASE_URL
        value: "https://dev-api.hawkaii.in"
      - key: FRONTEND_URL
        value: "https://dev.hawkaii.in"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dev.hawkaii.in"
      - key: CLOUDINARY_MOCK_UPLOADS
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: "hawkaii-hrms/dev"
      - key: CLOUDINARY_RESOURCE_TYPE
        value: "auto"
      - key: EMAIL_DELIVERY_PROVIDER
        value: "resend"
      - key: EMAIL_DELIVERY_MODE
        value: "log"
      - key: RESEND_FROM_EMAIL
        value: "Hawkaii HRMS Dev <verify@hawkaii.in>"
      - key: RESEND_FROM_NAME
        value: "Hawkaii HRMS Dev"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_READ_MAX
        value: "120"
      - key: RATE_LIMIT_WRITE_MAX
        value: "60"
      - key: RATE_LIMIT_AUTH_MAX
        value: "10"
      - key: RATE_LIMIT_PUBLIC_MAX
        value: "60"
      - key: PDF_COMPRESSION_ENABLED
        value: "true"
      - key: PDF_COMPRESSION_BINARY
        value: "gs"
      - key: PDF_COMPRESSION_QUALITY
        value: "ebook"
      - key: PDF_COMPRESSION_TIMEOUT_MS
        value: "30000"
      - key: PDF_COMPRESSION_FAIL_OPEN
        value: "true"

  - type: worker
    runtime: docker
    name: hawkaii-hrms-dev-outbox-worker
    dockerfilePath: ./hrms_backend/infra/docker/Dockerfile
    dockerContext: ./hrms_backend
    dockerCommand: pnpm worker:start
    plan: starter
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: APP_ENV
        value: "development"
      - key: APP_VERSION
        value: "0.1.0"
      - key: BUILD_SHA
        sync: false
      - key: HRMS_DATA_STORE
        value: "postgres"
      - key: DATABASE_URL
        sync: false
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: hawkaii-hrms-dev-valkey
          property: connectionString
      - key: CLOUDINARY_MOCK_UPLOADS
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: "hawkaii-hrms/dev"
      - key: CLOUDINARY_RESOURCE_TYPE
        value: "auto"
      - key: OUTBOX_WORKER_INTERVAL_MS
        value: "2000"
